# ── Eclipse Mosquitto Configuration ─────────────────────────

# TCP listener — standard MQTT
listener 1883
allow_anonymous true
protocol mqtt

# WebSocket listener — for browser MQTT clients
listener 9001
allow_anonymous true
protocol websockets

# Persistence — survive restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Connection settings
max_connections -1
max_inflight_messages 20
max_queued_messages 100
