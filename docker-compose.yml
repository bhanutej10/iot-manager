version: "3.9"

# ═══════════════════════════════════════════════════════════
#  IoT Device Manager — Docker Compose Stack
#  Services: mosquitto | backend | simulator | nginx
# ═══════════════════════════════════════════════════════════

services:

  # ── 1. MQTT Broker (Eclipse Mosquitto) ──────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT (TCP)
      - "9001:9001"    # MQTT over WebSocket
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - iot-net
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 2. Flask Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - USE_MQTT=true
      - SENSOR_INTERVAL=3
      - SECRET_KEY=iot-secret-key-2024
      - DATABASE_URL=sqlite:////app/data/iot.db
    volumes:
      - iot_data:/app/data
      - /tmp:/tmp                   # shared with simulator
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - iot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s             # increased — gives backend time to start

  # ── 3. Shell Script Sensor Simulator ────────────────────
  simulator:
    image: alpine:3.19
    container_name: iot-simulator
    restart: unless-stopped
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - USE_MQTT=true
      - SENSOR_INTERVAL=3
    volumes:
      - ./scripts:/scripts
      - /tmp:/tmp                   # write JSON snapshot here
    command: >
      sh -c "
        apk add --no-cache bash mosquitto-clients &&
        chmod +x /scripts/simulate_sensors.sh &&
        echo '[Simulator] Starting sensor simulation...' &&
        /scripts/simulate_sensors.sh
      "
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - iot-net

  # ── 4. Nginx Reverse Proxy + Static Files ───────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: iot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend                     # start after backend (no health check needed —
    networks:                       # nginx.conf now uses Docker DNS resolver)
      - iot-net

# ── Volumes ──────────────────────────────────────────────
volumes:
  mosquitto_data:
    name: iot_mosquitto_data
  mosquitto_log:
    name: iot_mosquitto_log
  iot_data:
    name: iot_backend_data

# ── Networks ─────────────────────────────────────────────
networks:
  iot-net:
    name: iot-network
    driver: bridge
